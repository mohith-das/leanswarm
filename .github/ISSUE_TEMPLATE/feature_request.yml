name: Feature request
description: Propose a product or engine improvement.
title: "[Feature]: "
labels:
  - enhancement
  - triage
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: This request is scoped to LeanSwarm's core mission.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user or system pain does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API/CLI/UX or implementation shape.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you consider and why not?

  - type: dropdown
    id: area
    attributes:
      label: Primary area
      options:
        - Simulation engine
        - Benchmarking
        - API
        - CLI
        - Web / replay UX
        - Docs
        - Tooling
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Expected impact
      options:
        - Low
        - Medium
        - High
    validations:
      required: true

  - type: textarea
    id: success
    attributes:
      label: Success criteria
      description: Concrete outcomes or metrics that mark this complete.
      placeholder: |
        - Metric 1
        - Metric 2
        - Validation approach

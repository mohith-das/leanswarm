repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.10
    hooks:
      - id: ruff-check
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.17.1
    hooks:
      - id: mypy
        additional_dependencies:
          - fastapi
          - pydantic
  - repo: https://github.com/pytest-dev/pytest
    rev: 8.4.1
    hooks:
      - id: pytest
        additional_dependencies:
          - fastapi
          - httpx
          - litellm
          - networkx
          - pydantic
          - diskcache

